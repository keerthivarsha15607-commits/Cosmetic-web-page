<!DOCTYPE html>
<html>
<head>
    <title>Signup - GlowAura</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="popup" class="popup"></div>
<body style="
    margin:0;
    padding:0;
    background: url('https://i.pinimg.com/1200x/80/7a/98/807a988d4b3c30681a53a440e4656276.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
">
<div class="form-container">
    <h2>Create Account</h2>
    <input type="text" id="newUser" placeholder="Username">
    <input type="password" id="newPass" placeholder="Password">
    <button onclick="signup()">Sign Up</button><br></br>
    <p>Already have account? <a href="login.html">Login</a></p>
</div>
<script src="script.js"></script>
</body>
</html>
